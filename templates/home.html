<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Bragging Rights</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css')}}" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css')}}"
    />
  </head>

  <body>
    <main class="container">
      <header class="header">
        <img
          src="{{ url_for('static', filename='logo.png')}}"
          alt="Bragging Rights Logo"
          class="logo"
        />
      </header>
      <section class="stats">
        <div class="card">
          <h2>Games Played</h2>
          <p>0</p>
        </div>
        <div class="card">
          <h2>Most Game Played</h2>
          <p>None</p>
        </div>
        <div class="card">
          <h2>Current Leader</h2>
          <p>No-one</p>
        </div>
      </section>

      <footer class="footer">
        <button
          class="login-button"
          onclick="window.location.href='{{ url_for('profile_selector') }}'"
        >
          Log In
        </button>
      </footer>
    </main>
  </body>
</html>
